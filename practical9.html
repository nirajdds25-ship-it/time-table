<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { font-family:Poppins; margin:0; }

header {
  background:#4facfe; color:white; text-align:center;
  padding:20px; animation:fade 2s;
}

.container { display:flex; flex-wrap:wrap; }

.card {
  flex:1; margin:10px; padding:20px; background:#eee;
  text-align:center; transition:0.3s;
}
.card:hover { transform:scale(1.1); }

.columns {
  column-count:3; padding:20px;
}

@keyframes fade {
  from{opacity:0;} to{opacity:1;}
}

@media(max-width:600px){
  .columns{column-count:1;}
}
</style>
</head>

<body>

<header>
  <h2>CSS3 Demo</h2>
</header>

<div class="container">
  <div class="card"><i class="fa fa-home"></i><p>Home</p></div>
  <div class="card"><i class="fa fa-user"></i><p>About</p></div>
  <div class="card"><i class="fa fa-envelope"></i><p>Contact</p></div>
</div>

<div class="columns">
  <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
  <p>Responsive design using CSS3 features.</p>
  <p>Columns adjust based on screen size.</p>
</div>

</body>
</html>
