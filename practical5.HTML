<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - John Doe</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        header { text-align: center; }
        img { width: 100px; border-radius: 50%; }

        ul, ol { margin: 5px 0; }

</head>
<body>
    <header>
        <img src="https://via.placeholder.com/100" alt="Profile">
        <h1>John Doe</h1>
        <p>Email: <a href="mailto:johndoe@example.com">johndoe@example.com</a> | 
           <a href="https://www.linkedin.com/in/johndoe" target="_blank">LinkedIn</a>
        </p>

    <section>

        <ul>
            <li>HTML, CSS, JavaScript</li>

        <table>
            <tr><th>Degree</th><th>Institution</th><th>Year</th></tr>
            <tr><td>B.Sc. CS</td><td>XYZ University</td><td>2018-2022</td></tr>
